<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.4"/>

  <!-- Connecting lines -->
  <line x1="8.5" y1="14.5" x2="21.5" y2="8"  stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="8.5" y1="17.5" x2="21.5" y2="24" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="24"  y1="10.5" x2="24"   y2="21.5" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Nodes -->
  <circle cx="8"  cy="16" r="3.5" fill="url(#g)"/>
  <circle cx="24" cy="8"  r="3.5" fill="url(#g)"/>
  <circle cx="24" cy="24" r="3.5" fill="url(#g)"/>

  <!-- Node highlights -->
  <circle cx="7"  cy="15" r="1.2" fill="white" opacity="0.35"/>
  <circle cx="23" cy="7"  r="1.2" fill="white" opacity="0.35"/>
  <circle cx="23" cy="23" r="1.2" fill="white" opacity="0.35"/>
</svg>
